name: Scrape Table Sums (23f1000820@ds.study.iitm.ac.in)

on: [push]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js (23f1000820@ds.study.iitm.ac.in)
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Scrape and sum tables (23f1000820@ds.study.iitm.ac.in)
        run: node scrape.js
      
      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            *.log
